<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pipeline CLI Demo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <header class="hero">
      <p class="badge">Sample demo app</p>
      <h1>Pipeline CLI Demo</h1>
      <p class="subtitle">
        A simple UI you can open in the browser. No Docker, no Kubernetes — just HTML, CSS, and JavaScript.
      </p>
    </header>

    <section class="card">
      <h2>Quick status</h2>
      <div class="status-row">
        <span id="status-dot" class="status-dot"></span>
        <span id="status-text">Checking...</span>
      </div>
      <p class="hint">This page runs entirely in your browser.</p>
    </section>

    <section class="card">
      <h2>Try it</h2>
      <label for="name-input">Your name</label>
      <div class="input-row">
        <input id="name-input" type="text" placeholder="Enter your name" />
        <button id="greet-btn" type="button">Say hello</button>
      </div>
      <p id="greet-output" class="output"></p>
    </section>

    <section class="card">
      <h2>Counter</h2>
      <div class="counter">
        <button id="dec-btn" type="button" aria-label="Decrease">−</button>
        <span id="count">0</span>
        <button id="inc-btn" type="button" aria-label="Increase">+</button>
      </div>
    </section>

    <footer class="footer">
      <p>Open <code>demo/index.html</code> in any browser to run this demo.</p>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
